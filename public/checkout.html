<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Green Power Checkout</title>
  <script src="https://js.stripe.com/v3/"></script>

  <style>
    body { font-family: Arial; max-width: 600px; margin: 40px auto; }
    #payment-element { margin-bottom: 24px; }
    button { background: #0a7cff; color: white; padding: 12px; border: none; width: 100%; font-size: 16px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    select, input { width: 100%; padding: 10px; margin-bottom: 12px; }
  </style>
</head>

<body>

  <h2>Completar Pago</h2>

  <!-- ⭐ SELECT DE ESTADOS CONTINENTALES + PR -->
  <label>Estado</label>
  <select id="state">
    <option value="AL">Alabama</option>
    <option value="AR">Arkansas</option>
    <option value="AZ">Arizona</option>
    <option value="CA">California</option>
    <option value="CO">Colorado</option>
    <option value="CT">Connecticut</option>
    <option value="DE">Delaware</option>
    <option value="FL">Florida</option>
    <option value="GA">Georgia</option>
    <option value="IA">Iowa</option>
    <option value="ID">Idaho</option>
    <option value="IL">Illinois</option>
    <option value="IN">Indiana</option>
    <option value="KS">Kansas</option>
    <option value="KY">Kentucky</option>
    <option value="LA">Louisiana</option>
    <option value="MA">Massachusetts</option>
    <option value="MD">Maryland</option>
    <option value="ME">Maine</option>
    <option value="MI">Michigan</option>
    <option value="MN">Minnesota</option>
    <option value="MO">Missouri</option>
    <option value="MS">Mississippi</option>
    <option value="MT">Montana</option>
    <option value="NC">North Carolina</option>
    <option value="ND">North Dakota</option>
    <option value="NE">Nebraska</option>
    <option value="NH">New Hampshire</option>
    <option value="NJ">New Jersey</option>
    <option value="NM">New Mexico</option>
    <option value="NV">Nevada</option>
    <option value="NY">New York</option>
    <option value="OH">Ohio</option>
    <option value="OK">Oklahoma</option>
    <option value="OR">Oregon</option>
    <option value="PA">Pennsylvania</option>
    <option value="RI">Rhode Island</option>
    <option value="SC">South Carolina</option>
    <option value="SD">South Dakota</option>
    <option value="TN">Tennessee</option>
    <option value="TX">Texas</option>
    <option value="UT">Utah</option>
    <option value="VA">Virginia</option>
    <option value="VT">Vermont</option>
    <option value="WA">Washington</option>
    <option value="WI">Wisconsin</option>
    <option value="WV">West Virginia</option>
    <option value="WY">Wyoming</option>
    <option value="PR">Puerto Rico</option>
  </select>

  <label>Código Postal</label>
  <input id="zip" placeholder="Ej: 00901" />

  <form id="payment-form">
    <div id="payment-element"></div>
    <button id="submit">Pagar</button>
    <div id="error-message" style="color:red;margin-top:12px;"></div>
  </form>

  <script>
    const stripe = Stripe("pk_live_51QbAfoP0O1T3MgmrNK5hRYACN0QBYoPKv7LJLe49ry9j0yWiyAJXmKVPFSPstC6NSUUszK8KOEy6RdiZI4nJSfYZ002Txanj0Y");

    // ⭐ LEE price_id DESDE LA URL
    const urlParams = new URLSearchParams(window.location.search);
    const priceId = urlParams.get("price_id");
    const productName = urlParams.get("name") || "Producto";

    async function initialize() {

      const state = document.querySelector("#state").value;
      const zip = document.querySelector("#zip").value || "00901";

      const response = await fetch("https://greenpower-backend.onrender.com/create-payment-intent", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          price_id: priceId,
          product_name: productName,
          state,
          zip
        })
      });

      const { clientSecret } = await response.json();

      const elements = stripe.elements({
        clientSecret,
        locale: "auto", // ⭐ IDIOMA AUTOMÁTICO
        appearance: { theme: "stripe" }
      });

      const paymentElement = elements.create("payment");
      paymentElement.mount("#payment-element");

      document.querySelector("#payment-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        document.querySelector("#submit").disabled = true;

        const { error } = await stripe.confirmPayment({
          elements,
          confirmParams: {
            return_url: "https://greenpowertech.store/pages/confirmacion"
          }
        });

        if (error) {
          document.querySelector("#error-message").textContent = error.message;
          document.querySelector("#submit").disabled = false;
        }
      });
    }

    initialize();
  </script>

</body>
</html>
