<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Green Power Checkout</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 40px auto; }
    #payment-element { margin-bottom: 24px; }
    button { background: #0a7cff; color: white; padding: 12px; border: none; width: 100%; font-size: 16px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

  <h2>Completar Pago</h2>

  <form id="payment-form">
    <div id="payment-element"></div>
    <button id="submit">Pagar</button>
    <div id="error-message" style="color:red;margin-top:12px;"></div>
  </form>

  <script>
    const stripe = Stripe("pk_live_51QbAfoP0O1T3MgmrNK5hRYACN0QBYoPKv7LJLe49ry9j0yWiyAJXmKVPFSPstC6NSUUszK8KOEy6RdiZI4nJSfYZ002Txanj0Y");

    async function initialize() {

      // ⭐ AQUÍ DEFINES EL PRODUCTO Y EL PRECIO
      const productPrice = 336895; // <-- CAMBIAR DINÁMICAMENTE SI QUIERES
      const productId = "ark3600";

      // ⭐ CREA EL PAYMENT INTENT CON AUTOMATIC PAYMENT METHODS
      const response = await fetch("https://greenpower-backend.onrender.com/create-payment-intent", {
        method: "POST",
        headers: { 
          "Content-Type": "application/json",
          "Accept": "application/json"
        },
        body: JSON.stringify({
          amount: productPrice,
          currency: "usd",
          description: "Compra Green Power",
          metadata: { product_id: productId },

          // ⭐ FORZAMOS PAÍS/ESTADO PARA QUE AFFIRM/KLARNA NUNCA DESAPAREZCAN
          billing_details: {
            address: {
              country: "US",
              state: "PR",
              postal_code: "00901"
            }
          }
        })
      });

      const { clientSecret } = await response.json();

      // ⭐ ELEMENTS CONFIGURADO PARA MÉTODOS AVANZADOS
      const elements = stripe.elements({
        clientSecret,
        appearance: {
          theme: "stripe"
        }
      });

      const paymentElement = elements.create("payment");
      paymentElement.mount("#payment-element");

      document.querySelector("#payment-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        document.querySelector("#submit").disabled = true;

        // ⭐ AQUÍ SE CORRIGE EL LOOP DE AFFIRM/KLARNA
        const { error } = await stripe.confirmPayment({
          elements,
          confirmParams: {
            return_url: "https://greenpowertech.store/pages/confirmacion" // ⭐ URL FINAL REAL
          }
        });

        if (error) {
          document.querySelector("#error-message").textContent = error.message;
          document.querySelector("#submit").disabled = false;
        }
      });
    }

    initialize();
  </script>

</body>
</html>
