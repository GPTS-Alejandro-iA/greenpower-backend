<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Green Power Tech Store - Checkout</title>
  <script src="https://js.stripe.com/v3/"></script>

  <style>
    body { 
      font-family: Arial, sans-serif; 
      max-width: 600px; 
      margin: 40px auto; 
      padding: 20px; 
      line-height: 1.5;
    }
    h2, h3 { margin-top: 24px; }
    label { display: block; margin: 12px 0 6px; font-weight: bold; }
    input, select { 
      width: 100%; 
      padding: 12px; 
      margin-bottom: 16px; 
      border: 1px solid #ccc; 
      border-radius: 4px; 
      font-size: 16px;
    }
    #payment-element { 
      margin: 24px 0; 
      padding: 12px; 
      border: 1px solid #e0e0e0; 
      border-radius: 4px;
    }
    button { 
      background: #0a7cff; 
      color: white; 
      padding: 14px; 
      border: none; 
      width: 100%; 
      font-size: 18px; 
      cursor: pointer; 
      border-radius: 4px;
      margin-top: 12px;
    }
    button:disabled { 
      opacity: 0.6; 
      cursor: not-allowed; 
    }
    #error-message { 
      color: #d32f2f; 
      margin-top: 12px; 
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h2>Completar tu pago</h2>

  <h3>Información de contacto y envío</h3>
  
  <label>Nombre</label>
  <input id="first_name" placeholder="Nombre" required />

  <label>Apellidos</label>
  <input id="last_name" placeholder="Apellidos" required />

  <label>Teléfono de contacto</label>
  <input id="phone" placeholder="Ej: 7870000000" />

  <label>Dirección</label>
  <input id="address_line1" placeholder="Calle y número" required />

  <label>Ciudad</label>
  <input id="city" placeholder="Ciudad" required />

  <label>Estado / Territorio</label>
  <select id="state" required>
    <option value="FL" selected>Florida</option>
    <option value="PR">Puerto Rico</option>
    <option value="AL">Alabama</option>
    <option value="AR">Arkansas</option>
    <option value="AZ">Arizona</option>
    <option value="WY">Wyoming</option>
  </select>

  <label>Código Postal</label>
  <input id="zip" placeholder="Ej: 00901" required />

  <button id="continue-btn">Continuar al pago seguro</button>

  <div id="payment-section" style="display: none;">
    <h3>Pago con Stripe</h3>
    <form id="payment-form">
      <div id="payment-element"></div>
      <button id="submit" type="submit">Pagar ahora</button>
      <div id="error-message"></div>
    </form>
  </div>

  <!-- ⭐ FIX CRÍTICO: REATACHAR EVENTO DESPUÉS DE QUE SHOPIFY REESCRIBE EL DOM -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const btn = document.getElementById("continue-btn");
      if (btn) {
        btn.addEventListener("click", async () => {
          const success = await createPaymentIntent();
          if (!success) btn.disabled = false;
        });
      }
    });
  </script>

  <!-- ⭐ SCRIPT PRINCIPAL -->
  <script>
    const stripe = Stripe("pk_live_51QbAfoP0O1T3MgmrNK5hRYACN0QBYoPKv7LJLe49ry9j0yWiyAJXmKVPFSPstC6NSUUszK8KOEy6RdiZI4nJSfYZ002Txanj0Y");

    let elements = null;
    let clientSecret = null;

    async function createPaymentIntent() {
      const priceId = new URLSearchParams(window.location.search).get("price_id");
      if (!priceId) {
        document.getElementById("error-message").textContent = "Falta price_id en la URL.";
        return false;
      }

      const state = document.getElementById("state").value;
      const zip = document.getElementById("zip").value.trim();

      if (!state || !zip) {
        document.getElementById("error-message").textContent = "Por favor completa Estado y Código Postal.";
        return false;
      }

      const btn = document.getElementById("continue-btn");
      btn.disabled = true;
      btn.textContent = "Procesando...";

      try {
        const response = await fetch("https://greenpower-backend.onrender.com/create-payment-intent", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({
            price_id: priceId,
            state: state,
            zip: zip
          })
        });

        const data = await response.json();

        if (!response.ok || !data.clientSecret) {
          document.getElementById("error-message").textContent = data.error || "Error al crear el pago.";
          return false;
        }

        clientSecret = data.clientSecret;

        document.getElementById("payment-section").style.display = "block";
        btn.style.display = "none";

        elements = stripe.elements({
          clientSecret,
          locale: "es",
          appearance: { theme: "stripe" }
        });

        const paymentElement = elements.create("payment", { layout: "tabs" });
        paymentElement.mount("#payment-element");

        return true;

      } catch (err) {
        console.error(err);
        document.getElementById("error-message").textContent = "Error de conexión.";
        return false;
      } finally {
        btn.disabled = false;
        btn.textContent = "Continuar al pago seguro";
      }
    }

    document.getElementById("payment-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!elements || !clientSecret) return;

      const submitBtn = document.getElementById("submit");
      submitBtn.disabled = true;
      submitBtn.textContent = "Procesando pago...";

      const firstName = document.getElementById("first_name").value.trim();
      const lastName = document.getElementById("last_name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const addressLine1 = document.getElementById("address_line1").value.trim();
      const city = document.getElementById("city").value.trim();
      const state = document.getElementById("state").value;
      const zip = document.getElementById("zip").value.trim();

      const { error } = await stripe.confirmPayment({
        elements,
        confirmParams: {
          return_url: "https://greenpowertech.store/pages/confirmacion",
          payment_method_data: {
            billing_details: {
              name: `${firstName} ${lastName}`.trim() || undefined,
              phone: phone || undefined,
              address: {
                country: "US",
                line1: addressLine1 || undefined,
                city: city || undefined,
                state: state,
                postal_code: zip
              }
            }
          }
        }
      });

      if (error) {
        document.getElementById("error-message").textContent = error.message;
        submitBtn.disabled = false;
        submitBtn.textContent = "Pagar ahora";
      }
    });
  </script>

</body>
</html>
